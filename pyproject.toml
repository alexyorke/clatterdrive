[tool.ruff]
target-version = "py312"
exclude = [".git", ".pytest_cache", ".pytest_tmp", ".tmp_pip", ".tmp_tests", "samples"]

[tool.ruff.lint]
select = ["ANN"]
ignore = ["ANN401"]

[tool.mypy]
python_version = "3.12"
exclude = '(^samples/|^\.tmp_)'
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_unused_ignores = true
