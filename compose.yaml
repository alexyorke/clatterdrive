services:
  clatterdrive:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      FAKE_HDD_HOST: 0.0.0.0
      FAKE_HDD_PORT: 8080
      FAKE_HDD_AUDIO: off
      FAKE_HDD_BACKING_DIR: /data
      FAKE_HDD_DRIVE_PROFILE: desktop_7200_internal
      FAKE_HDD_ACOUSTIC_PROFILE: mounted_in_case
    volumes:
      - ./backing_storage:/data
    restart: unless-stopped
