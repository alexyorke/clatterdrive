name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release zip
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Bootstrap Python and .NET tooling
        run: scripts/bootstrap.ps1

      - name: Build package
        env:
          WINDOWS_SIGNING_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_THUMBPRINT }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: scripts/package-windows.ps1

      - name: Build installer
        run: scripts/build-installer.ps1 -UseExistingPackage

      - name: Signing status
        env:
          WINDOWS_SIGNING_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_THUMBPRINT }}
        run: |
          if ($env:WINDOWS_SIGNING_THUMBPRINT) {
            Write-Host "Signing thumbprint configured; scripts/package-windows.ps1 signs binaries before zipping when signtool is available."
          } else {
            Write-Host "No signing secrets configured; release zip is unsigned."
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ClatterDrive-windows-x64
          path: |
            .runtime/package/ClatterDrive-windows-x64.zip
            .runtime/installer/ClatterDrive-windows-x64.msi

  macos-release:
    name: macOS release DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.8"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import Apple signing certificate when configured
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_BASE64}" ]]; then
            echo "No Apple Developer ID certificate secret configured; macOS release will be unsigned."
            exit 0
          fi
          certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_path="${RUNNER_TEMP}/clatterdrive-signing.keychain-db"
          echo "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security import "${certificate_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${APPLE_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security list-keychain -d user -s "${keychain_path}"

      - name: Build macOS package
        env:
          CLATTERDRIVE_MACOS_ARCH: ${{ matrix.arch }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash scripts/package-macos.sh

      - name: Packaged backend and mount_webdav E2E
        env:
          CLATTERDRIVE_MACOS_ARCH: ${{ matrix.arch }}
        run: bash scripts/test-macos-e2e.sh --packaged --from-dmg --include-mount --use-existing-package

      - uses: actions/upload-artifact@v4
        with:
          name: ClatterDrive-macos-${{ matrix.arch }}
          path: .runtime/package/ClatterDrive-macos-${{ matrix.arch }}.dmg

  publish-release:
    name: Create draft GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows-release
      - macos-release

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: .runtime/release

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t artifacts < <(find .runtime/release -maxdepth 3 -type f -print)
          printf '%s\n' "${artifacts[@]}"
          gh release create "${TAG_NAME}" "${artifacts[@]}" \
            --draft \
            --title "ClatterDrive ${TAG_NAME}" \
            --notes "Draft Windows and macOS release build."
