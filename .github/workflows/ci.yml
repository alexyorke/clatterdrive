name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Compile
        run: uv run python -m compileall -q clatterdrive tools tests main.py smoke.py

      - name: Lint
        run: uv run ruff check .

      - name: Dead Code
        run: uv run python -m vulture clatterdrive tools tests main.py smoke.py --min-confidence 80

      - name: Type Check
        run: uv run python -m mypy .

      - name: Test
        run: uv run python -m pytest -q

      - name: Smoke
        run: uv run python smoke.py
