name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cheroot mypy numpy pytest requests ruff sounddevice WsgiDAV

      - name: Compile
        run: python -m py_compile audio_engine.py conftest.py fs_simulator.py generate_audio_samples.py hdd_model.py main.py os_scheduler.py profile_core.py profile_fragmentation.py stress_test.py test_fragmentation.py test_simulator.py vfs_provider.py

      - name: Lint Annotations
        run: ruff check .

      - name: Type Check
        run: python -m mypy .

      - name: Test
        run: python -m pytest -q
